<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Password — NERD Tools Foundation</title>
  <meta name="description" content="Reset your NERD Tools Foundation account password.">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#eef7fa">
  <link rel="apple-touch-icon-precomposed" href="https://nerdtools.co.in/images/site/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Lora:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./shared-theme.css">
</head>
<body>
  <div class="page-shell">

    <header class="site-header">
      <div class="brand">
        <img class="brand-logo" src="./assets/logo_ntf.png" alt="NERD Tools Foundation logo">
        <div class="brand-copy">
          <div class="brand-name">NERD Tools Foundation</div>
          <div class="brand-tagline">Cognitive Learning Ability Screening Score (CLASS)</div>
        </div>
      </div>
      <nav class="site-nav" aria-label="Primary navigation">
        <a class="nav-link" href="index.html">← Overview</a>
        <a class="nav-link" href="login.html">Login</a>
      </nav>
    </header>

    <main class="auth-shell">
      <div class="auth-card">

        <div style="text-align:center; margin-bottom: 24px;">
          <div style="font-size:2rem; margin-bottom:12px;">🔑</div>
          <p class="kicker" style="justify-content:center;">Account Recovery</p>
          <h1 class="headline" style="margin-top:4px;">Reset your password</h1>
          <p class="muted" style="margin-top:8px; font-size:0.9rem;">Enter your registered email and we'll help you get back in.</p>
        </div>

        <form name="resetpw" method="post" action="https://nerdtools.biodb.in/assessment/1.resetpassword.php" class="auth-form">

          <div class="field">
            <label for="reset-username">Registered email address</label>
            <input id="reset-username" type="email" name="username"
                   placeholder="you@example.com"
                   required autocomplete="email">
          </div>

          <input type="hidden" name="role" value="2">

          <div style="margin-top: 4px;">
            <input type="submit" id="reset-submit" name="submit" value="Send Reset Link" style="width:100%; min-height:48px; font-size:1rem; border-radius:10px;">
          </div>

        </form>

        <p class="auth-alt-link" style="text-align:center; margin-top:20px;">
          Remembered it? <a href="login.html">Back to Login →</a>
        </p>

      </div>
    </main>

    <footer class="site-footer">
      <p>© Nerds Tools Foundation &nbsp;|&nbsp; <a href="mailto:alert.nerdtools@yahoo.com">alert.nerdtools@yahoo.com</a></p>
    </footer>

  </div>
</body>
</html>
