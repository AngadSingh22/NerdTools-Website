<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login — NERD Tools Foundation</title>
  <meta name="description" content="Log in to your NERD Tools Foundation account to access child records, start screenings, and review reports.">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#eef7fa">
  <link rel="apple-touch-icon-precomposed" href="https://nerdtools.co.in/images/site/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Lora:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./shared-theme.css">
</head>
<body>
  <div class="page-shell">

    <header class="site-header">
      <div class="brand">
        <img class="brand-logo" src="./NERD Tools Foundation_files/logo_ntf.png" alt="NERD Tools Foundation logo">
        <div class="brand-copy">
          <div class="brand-name">NERD Tools Foundation</div>
          <div class="brand-tagline">Cognitive Learning Ability Screening Score (CLASS)</div>
        </div>
      </div>
      <nav class="site-nav" aria-label="Primary navigation">
        <a class="nav-link" href="https://nerdtools.biodb.in/assessment/index.php">← Back to overview</a>
      </nav>
    </header>

    <main class="auth-shell">
      <div class="auth-card">

        <div style="text-align:center; margin-bottom: 24px;">
          <p class="kicker" style="justify-content:center;">Secure Sign In</p>
          <h1 class="headline" style="margin-top:4px;">Welcome back</h1>
          <p class="muted" style="margin-top:8px; font-size:0.9rem;">Use the same credentials as the live site.</p>
        </div>

        <form name="login" method="post" action="https://nerdtools.biodb.in/assessment/1.verifier.php" class="auth-form">

          <div class="field">
            <label for="login-username">Email address</label>
            <input id="login-username" type="email" name="username" placeholder="you@example.com" required autocomplete="email">
          </div>

          <div class="field">
            <label for="login-password">Password</label>
            <input id="login-password" type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
            <div class="field-hint"><a href="https://nerdtools.biodb.in/assessment/1.forgotpassword.php">Forgot password?</a></div>
          </div>

          <div class="checkbox-row">
            <input id="login-consent" type="checkbox" name="consent" required>
            <label for="login-consent">I have read and understood the <a href="https://nerdtools.biodb.in/assessment/tnc.php" target="_blank" rel="noopener noreferrer">Terms and Conditions</a> for use of this website and agree to the same.</label>
          </div>

          <input type="hidden" name="role" value="2">

          <div style="margin-top: 4px;">
            <input type="submit" id="login-submit" name="submit" value="Login to account" style="width:100%; min-height:48px; font-size:1rem; border-radius:10px;">
          </div>

        </form>

        <p class="auth-alt-link" style="text-align:center; margin-top:20px;">
          Not sure where to start? <a href="https://nerdtools.biodb.in/assessment/index.php">View the overview →</a>
        </p>
      </div>
    </main>

    <footer class="site-footer">
      <p>© Nerds Tools Foundation &nbsp;|&nbsp; <a href="mailto:alert.nerdtools@yahoo.com">alert.nerdtools@yahoo.com</a></p>
    </footer>

  </div>
</body>
</html>
